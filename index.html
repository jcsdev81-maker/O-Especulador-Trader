<!DOCTYPE html>
<html lang="pt">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sistema de Especulação + Alertas</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/lightweight-charts/dist/lightweight-charts.standalone.production.js"></script>
  <style>
    body { background: #0a0f1c; }
    .golden { background: linear-gradient(90deg, #facc15, #eab308); -webkit-background-clip: text; color: transparent; }
    .tab-active { border-bottom: 3px solid #facc15; color: white; }
  </style>
</head>
<body class="min-h-screen text-slate-200">
  <div class="max-w-7xl mx-auto p-6">
    <h1 class="text-5xl font-bold text-center golden mb-1">SISTEMA DE ESPECULAÇÃO</h1>
    <p class="text-center text-slate-400">Múltiplas Zonas + Som de Alerta</p>

    <div class="flex gap-8 mt-10 border-b border-slate-700">
      <button onclick="showTab(0)" class="tab-active pb-3 px-6 font-bold" id="tab0">DASHBOARD</button>
      <button onclick="showTab(1)" class="pb-3 px-6 font-bold text-slate-400 hover:text-white" id="tab1">ZONAS</button>
      <button onclick="showTab(2)" class="pb-3 px-6 font-bold text-slate-400 hover:text-white" id="tab2">HISTÓRICO</button>
    </div>

    <!-- DASHBOARD -->
    <div id="content0" class="mt-8">
      <div class="grid grid-cols-12 gap-6">
        <div class="col-span-8 bg-slate-900 rounded-3xl p-4 border border-slate-700">
          <div id="chart" class="w-full h-[520px]"></div>
        </div>

        <div class="col-span-4 space-y-6">
          <select id="symbol" onchange="changeSymbol()" class="w-full bg-slate-800 rounded-2xl p-4 text-lg">
            <option value="BTCUSDT">BTC/USDT</option>
            <option value="ETHUSDT">ETH/USDT</option>
            <option value="SOLUSDT">SOL/USDT</option>
            <option value="SUIUSDT">SUI/USDT</option>
          </select>

          <div class="flex gap-3">
            <button onclick="setType('LONG')" id="btnLong" class="flex-1 py-6 rounded-2xl font-bold text-2xl bg-emerald-500 text-black">LONG</button>
            <button onclick="setType('SHORT')" id="btnShort" class="flex-1 py-6 rounded-2xl font-bold text-2xl bg-red-500">SHORT</button>
          </div>

          <div class="bg-slate-900 rounded-3xl p-6 text-center border border-slate-700">
            <p class="text-slate-400">Preço Atual</p>
            <p id="currentPrice" class="text-5xl font-mono">94.850</p>
          </div>

          <button onclick="sendManualTelegram()" class="w-full py-6 bg-blue-600 hover:bg-blue-500 font-bold text-xl rounded-3xl">
            📤 Enviar Manual Telegram
          </button>
        </div>
      </div>
    </div>

    <!-- ZONAS (Múltiplas) -->
    <div id="content1" class="hidden mt-10">
      <div class="max-w-3xl mx-auto bg-slate-900 rounded-3xl p-8">
        <h2 class="text-3xl font-bold golden text-center mb-8">Múltiplas Golden Zones</h2>
        
        <div id="zonesList" class="space-y-4 mb-6"></div>

        <div class="grid grid-cols-2 gap-4">
          <input id="newHigh" type="number" placeholder="Swing High" class="bg-slate-800 p-5 rounded-2xl">
          <input id="newLow" type="number" placeholder="Swing Low" class="bg-slate-800 p-5 rounded-2xl">
        </div>
        <button onclick="addNewZone()" class="mt-4 w-full py-6 bg-yellow-400 text-black font-bold text-xl rounded-3xl">
          + ADICIONAR NOVA GOLDEN ZONE
        </button>
      </div>
    </div>

    <!-- HISTÓRICO -->
    <div id="content2" class="hidden mt-10">
      <div class="bg-slate-900 rounded-3xl p-8 max-w-4xl mx-auto">
        <h2 class="text-3xl font-bold mb-6">Histórico de Alertas</h2>
        <div id="historyList" class="space-y-4"></div>
      </div>
    </div>
  </div>

  <script>
    let currentType = 'LONG';
    let currentSymbol = 'BTCUSDT';
    let currentPrice = 94850;
    let zones = JSON.parse(localStorage.getItem('goldenZones')) || [];
    let history = JSON.parse(localStorage.getItem('specHistory')) || [];

    function setType(type) {
      currentType = type;
      document.getElementById('btnLong').classList.toggle('bg-emerald-500', type === 'LONG');
      document.getElementById('btnLong').classList.toggle('bg-slate-700', type !== 'LONG');
      document.getElementById('btnShort').classList.toggle('bg-red-500', type === 'SHORT');
      document.getElementById('btnShort').classList.toggle('bg-slate-700', type !== 'SHORT');
    }

    async function updatePrice() {
      try {
        const res = await fetch(`https://api.binance.com/api/v3/ticker/price?symbol=${currentSymbol}`);
        const data = await res.json();
        currentPrice = parseFloat(data.price);
        document.getElementById('currentPrice').textContent = currentPrice.toLocaleString('pt-BR');
        checkAllZones();
      } catch(e) {}
    }

    function checkAllZones() {
      zones.forEach((zone, index) => {
        const fib618 = zone.high - (zone.high - zone.low) * 0.618;
        const fib786 = zone.high - (zone.high - zone.low) * 0.786;

        if (currentPrice >= fib618 && currentPrice <= fib786) {
          triggerAlert(zone, index);
        }
      });
    }

    function triggerAlert(zone, index) {
      // Som de alerta
      const audio = new Audio('https://freesound.org/data/previews/66/66930_931655-lq.mp3');
      audio.volume = 0.8;
      audio.play();

      // Alerta visual
      new Notification("🚨 GOLDEN ZONE ATIVADA!", {
        body: `${currentSymbol} ${currentType} - Preço: ${currentPrice}`,
        icon: "https://i.imgur.com/8Z7Z7Z7.png"
      });

      sendAutoTelegram(zone);
      saveToHistory("AUTO", `Golden Zone #${index+1}`);
    }

    function addNewZone() {
      const high = parseFloat(document.getElementById('newHigh').value);
      const low = parseFloat(document.getElementById('newLow').value);
      if (!high || !low) return alert("Preencha High e Low");

      zones.push({ high, low, active: true });
      localStorage.setItem('goldenZones', JSON.stringify(zones));
      renderZones();
      alert("✅ Nova Golden Zone adicionada!");
    }

    function renderZones() {
      const html = zones.map((z, i) => `
        <div class="bg-slate-800 rounded-2xl p-6 flex justify-between items-center">
          <div>
            <span class="font-mono">Zona ${i+1}</span><br>
            <span class="text-yellow-400">${z.high} — ${z.low}</span>
          </div>
          <button onclick="removeZone(${i})" class="text-red-400 hover:text-red-500">Remover</button>
        </div>
      `).join('');
      document.getElementById('zonesList').innerHTML = html || "<p class='text-slate-500 text-center py-8'>Nenhuma zona cadastrada ainda.</p>";
    }

    function removeZone(i) {
      zones.splice(i, 1);
      localStorage.setItem('goldenZones', JSON.stringify(zones));
      renderZones();
    }

    function sendAutoTelegram(zone) { /* mesmo código do anterior */ 
      const token = localStorage.getItem('tgToken');
      const chatId = localStorage.getItem('tgChatId');
      if (!token || !chatId) return;

      const msg = `🚨 *GOLDEN ZONE ATIVADA!*\n\n*Ativo:* ${currentSymbol}\n*Direção:* ${currentType}\n*Preço:* ${currentPrice}\n*Zona:* ${zone.high} - ${zone.low}`;
      fetch(`https://api.telegram.org/bot${token}/sendMessage?chat_id=${chatId}&text=${encodeURIComponent(msg)}&parse_mode=Markdown`);
    }

    function sendManualTelegram() { /* mesmo do anterior */ 
      // ... (código mantido)
      alert("Envie manualmente (mesmo sistema anterior)");
    }

    function saveToHistory(mode, reason) {
      history.unshift({
        time: new Date().toLocaleString('pt-BR'),
        symbol: currentSymbol,
        type: currentType,
        price: currentPrice,
        reason
      });
      localStorage.setItem('specHistory', JSON.stringify(history));
    }

    function renderHistory() {
      // ... (mesmo do anterior)
      document.getElementById('historyList').innerHTML = history.map(h => `
        <div class="bg-slate-800 p-5 rounded-2xl flex justify-between">
          <div>${h.time} • ${h.symbol} ${h.type}</div>
          <div class="text-right">${h.price}<br><span class="text-xs">${h.reason}</span></div>
        </div>
      `).join('') || "<p class='text-center text-slate-500 py-10'>Sem alertas ainda</p>";
    }

    function showTab(n) {
      document.querySelectorAll('[id^="content"]').forEach(el => el.classList.add('hidden'));
      document.getElementById(`content${n}`).classList.remove('hidden');
      if (n === 1) renderZones();
      if (n === 2) renderHistory();
    }

    // Inicialização
    window.onload = () => {
      const chart = LightweightCharts.createChart(document.getElementById('chart'), { width: 900, height: 520, layout: { backgroundColor: '#0f172a' }});
      chart.addCandlestickSeries().setData([{ time: '2025-04-04', open: 92000, high: 96000, low: 91000, close: 94850 }]);

      updatePrice();
      setInterval(updatePrice, 7000);
      renderZones();
      showTab(0);

      // Pedir permissão de notificação
      if (Notification.permission === "default") Notification.requestPermission();
    };
  </script>
</body>
</html>
