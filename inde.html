<!DOCTYPE html>
<html lang="pt">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sistema de Especulação</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/lightweight-charts/dist/lightweight-charts.standalone.production.js"></script>
  <style>
    body { background: #0a0f1c; font-family: system-ui; }
    .golden { background: linear-gradient(90deg, #facc15, #eab308); -webkit-background-clip: text; color: transparent; }
    .tab-active { border-bottom: 4px solid #facc15; color: white; font-weight: bold; }
  </style>
</head>
<body class="min-h-screen text-slate-200">
  <div class="max-w-7xl mx-auto p-6">
    <h1 class="text-5xl font-bold text-center golden mb-1">SISTEMA DE ESPECULAÇÃO</h1>
    <p class="text-center text-slate-400 mb-8">Múltiplas Zonas • Som de Alerta • Telegram</p>

    <!-- Tabs -->
    <div class="flex gap-10 border-b border-slate-700 mb-8">
      <button onclick="showTab(0)" class="tab-active pb-4 px-8" id="tab0">DASHBOARD</button>
      <button onclick="showTab(1)" class="pb-4 px-8 text-slate-400 hover:text-white" id="tab1">ZONAS</button>
      <button onclick="showTab(2)" class="pb-4 px-8 text-slate-400 hover:text-white" id="tab2">HISTÓRICO</button>
    </div>

    <!-- DASHBOARD -->
    <div id="content0">
      <div class="grid grid-cols-12 gap-6">
        <!-- GRÁFICO -->
        <div class="col-span-8 bg-slate-900 rounded-3xl p-5 border border-slate-700">
          <div id="chart" class="w-full h-[560px] rounded-2xl"></div>
        </div>

        <!-- Painel Lateral -->
        <div class="col-span-4 space-y-6">
          <select id="symbol" onchange="changeSymbol()" class="w-full bg-slate-800 border border-slate-700 rounded-2xl p-4 text-lg focus:outline-none focus:border-yellow-400">
            <option value="BTCUSDT">BTC/USDT</option>
            <option value="ETHUSDT">ETH/USDT</option>
            <option value="SOLUSDT">SOL/USDT</option>
            <option value="SUIUSDT">SUI/USDT</option>
          </select>

          <div class="flex gap-4">
            <button onclick="setType('LONG')" id="btnLong" 
                    class="flex-1 py-7 rounded-2xl font-bold text-2xl bg-emerald-500 hover:bg-emerald-600 text-black">LONG</button>
            <button onclick="setType('SHORT')" id="btnShort" 
                    class="flex-1 py-7 rounded-2xl font-bold text-2xl bg-red-500 hover:bg-red-600">SHORT</button>
          </div>

          <div class="bg-slate-900 border border-slate-700 rounded-3xl p-6 text-center">
            <p class="text-slate-400 text-sm">PREÇO ATUAL</p>
            <p id="currentPrice" class="text-6xl font-mono font-bold text-white mt-2">94.850</p>
          </div>

          <button onclick="sendManualTelegram()" 
                  class="w-full py-7 bg-blue-600 hover:bg-blue-700 rounded-3xl font-bold text-xl flex items-center justify-center gap-3">
            📤 Enviar Manual para Telegram
          </button>
        </div>
      </div>
    </div>

    <!-- ZONAS -->
    <div id="content1" class="hidden">
      <div class="max-w-2xl mx-auto bg-slate-900 rounded-3xl p-10">
        <h2 class="text-3xl font-bold golden text-center mb-8">Gerenciar Golden Zones</h2>
        <div id="zonesList" class="space-y-4 mb-8"></div>
        <div class="grid grid-cols-2 gap-4">
          <input id="newHigh" type="number" placeholder="Swing High" class="bg-slate-800 p-5 rounded-2xl text-lg">
          <input id="newLow" type="number" placeholder="Swing Low" class="bg-slate-800 p-5 rounded-2xl text-lg">
        </div>
        <button onclick="addNewZone()" class="mt-6 w-full py-7 bg-yellow-400 hover:bg-yellow-300 text-black font-bold text-xl rounded-3xl">
          + ADICIONAR GOLDEN ZONE
        </button>
      </div>
    </div>

    <!-- HISTÓRICO -->
    <div id="content2" class="hidden">
      <div class="max-w-4xl mx-auto bg-slate-900 rounded-3xl p-8">
        <h2 class="text-3xl font-bold mb-6">Histórico de Alertas</h2>
        <div id="historyList" class="space-y-4"></div>
      </div>
    </div>
  </div>

  <script>
    let chart, candleSeries;
    let currentType = 'LONG';
    let currentSymbol = 'BTCUSDT';
    let currentPrice = 94850;
    let zones = JSON.parse(localStorage.getItem('goldenZones')) || [];
    let history = JSON.parse(localStorage.getItem('specHistory')) || [];

    function initChart() {
      const chartContainer = document.getElementById('chart');
      chart = LightweightCharts.createChart(chartContainer, {
        width: chartContainer.clientWidth,
        height: 560,
        layout: { backgroundColor: '#1e2937', textColor: '#e2e8f0' },
        grid: { vertLines: { color: '#334155' }, horzLines: { color: '#334155' } },
        timeScale: { timeVisible: true, secondsVisible: false },
        crosshair: { mode: LightweightCharts.CrosshairMode.Normal }
      });

      candleSeries = chart.addCandlestickSeries({
        upColor: '#22c55e',
        downColor: '#ef4444',
        borderUpColor: '#22c55e',
        borderDownColor: '#ef4444',
        wickUpColor: '#86efac',
        wickDownColor: '#f87171'
      });

      // Dados de exemplo mais realistas
      candleSeries.setData([
        { time: '2025-04-01', open: 92000, high: 94500, low: 91500, close: 93800 },
        { time: '2025-04-02', open: 93800, high: 95200, low: 93000, close: 94800 },
        { time: '2025-04-03', open: 94800, high: 96500, low: 94200, close: 95800 },
        { time: '2025-04-04', open: 95800, high: 97200, low: 95000, close: 96500 }
      ]);

      chart.timeScale().fitContent();
    }

    async function updatePrice() {
      try {
        const res = await fetch(`https://api.binance.com/api/v3/ticker/price?symbol=${currentSymbol}`);
        const data = await res.json();
        currentPrice = parseFloat(data.price);
        document.getElementById('currentPrice').textContent = currentPrice.toLocaleString('pt-BR');
        checkAllZones();
      } catch(e) {}
    }

    function setType(type) {
      currentType = type;
      document.getElementById('btnLong').classList.toggle('bg-emerald-500', type === 'LONG');
      document.getElementById('btnLong').classList.toggle('bg-emerald-600', type === 'LONG');
      document.getElementById('btnShort').classList.toggle('bg-red-500', type === 'SHORT');
      document.getElementById('btnShort').classList.toggle('bg-red-600', type === 'SHORT');
    }

    function changeSymbol() {
      currentSymbol = document.getElementById('symbol').value;
      updatePrice();
    }

    // Funções de Zonas, Histórico, Telegram, etc. (mantidas do anterior)
    function addNewZone() { /* ... mesmo código anterior ... */ }
    function renderZones() { /* ... */ }
    function checkAllZones() { /* ... */ }
    function triggerAlert() { /* ... com som */ }
    function sendManualTelegram() { /* ... */ }
    function saveToHistory() { /* ... */ }
    function renderHistory() { /* ... */ }
    function showTab(n) { /* ... */ }

    window.onload = () => {
      initChart();
      updatePrice();
      setInterval(updatePrice, 8000);
      renderZones();
      renderHistory();
      showTab(0);

      if (Notification.permission === "default") Notification.requestPermission();
    };
  </script>
</body>
</html>
